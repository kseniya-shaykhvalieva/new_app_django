{% extends 'catalog/base.html' %}

{% block content %}
<div class="container mt-4">
    <h3>Удалить товар</h3>
    <p class="card-text">Вы действительно хотите удалить {{ object.name }} ?</p>
    <form method="post" enctype="multipart/form-data" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'catalog:home' %}" class="btn btn-outline-secondary">Отменить</a>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content%}
<div class="container">
    <div class="row text-center">
        <div class="row">
            <div class="col-3">
                <div class="card mb-4 box-shadow">
                    <div class="card-header">
                        <h3 class="my-0 font-weight-normal">{{ product.name }}</h3>
                    </div>
                    <div class="card">
                        {% if product.image %}
                        <img src="{{ product.image.url }}" class="card-img-top" alt="Не удалось загрузить изображение">
                        {% else %}
                        <img src="..." class="card-img-top" alt="Изображение отсутствует">
                        {% endif %}
                    </div>
                    <div class="card-body">
                        <h4 class="card-title pricing-card-title">Цена: {{ product.price }} руб.</h4>
                        <ul class="list-unstyled mt-3 mb-4 text-start m-3">
                            <li>Описание: {{ product.description }}</li>
                        </ul>
                        <button type="button" class="btn btn-lg btn-block btn-outline-primary">Купить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}

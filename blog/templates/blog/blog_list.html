{% extends 'blog/base.html' %}
{% block content%}
<main>
    <div class="album py-5 bg-body-tertiary">
        <div class="container">
            <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3">
                {% for blog in object_list %}
                <div class="col">
                    <div class="card mb-4 box-shadow h-100 d-flex flex-column">
                        <div class="card">
                            {% if blog.preview %}
                            <img src="{{ blog.preview.url }}" class="preview-img"
                                 alt="Не удалось загрузить изображение">
                            {% else %}
                            <img src="..." class="card-img-top" alt="Изображение отсутствует">
                            {% endif %}
                        </div>
                        <div class="card-header h-100">
                            <h3 class="my-0 font-weight-normal">{{ blog.title }}</h3>
                        </div>
                        <div class="card-body h-100">
                            <ul class="list-unstyled text-start">
                                <li>{{ blog.content|truncatechars:50 }}</li>
                            </ul>
                        </div>
                        <div class="card-body mt-auto">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="btn-group">
                                    <a href="{% url 'blog:blog_detail' blog.pk %}" class="btn btn-sm btn-outline-secondary">Посмотреть</a>
                                    <a href="{% url 'blog:blog_update' blog.pk %}" class="btn btn-sm btn-outline-secondary">Редактировать</a>
                                </div>
                                <a href="{% url 'blog:blog_delete' blog.pk %}" title="Удалить" class="btn btn-sm text-danger btn-outline-danger" aria-label="Close">✕</a>
                            </div>
                            <small class="text-body-secondary">{{ blog.created_at }}</small>
                        </div>

                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</main>
{% endblock %}
